send_alert:
  name: Send Alert
  description: Sends a custom alert notification
  fields:
    message:
      name: Message
      description: The message content to display in the notification.
      required: true
      example: "Inverter is disconnected!"
      selector:
        text:
    title:
      name: Title
      description: The title of the notification.
      required: false
      default: "Solar Plus Intelbras Alert"
      example: "Inverter Status"
      selector:
        text:
    notification_id:
      name: Notification ID
      description: A unique ID for the notification. If not provided, a unique ID will be generated.
      required: false
      example: "solar_inverter_status"
      selector:
        text:
    priority:
      name: Priority
      description: The priority level of the notification.
      required: false
      default: "normal"
      selector:
        select:
          options:
            - "normal"
            - "warning"
            - "critical"
            - "info"

check_notifications:
  name: Check Notifications
  description: Manually check for new notifications from the Intelbras API.

import_history:
  name: Import History
  description: Backfill long-term statistics (Energy Dashboard) with monthly generation history.
  fields:
    years:
      name: Years
      description: How many years back to import (including the current year).
      required: false
      default: 2
      selector:
        number:
          min: 1
          max: 10
          mode: box
rules:
  # Bronze
  action-setup:
    status: done
    comment: Services are registered in async_setup.
  appropriate-polling: done
  brands:
    status: exempt
    comment: |
      Custom integration distributed via HACS; brand assets are not submitted
      to the home-assistant/brands repository.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions: done
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions:
    status: exempt
    comment: Removed via the standard Home Assistant / HACS flow.
  entity-event-setup:
    status: exempt
    comment: No explicit event subscriptions.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # Silver
  action-exceptions:
    status: exempt
    comment: The notification services do not raise typed exceptions.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable:
    status: done
    comment: Handled by the DataUpdateCoordinator.
  parallel-updates: done
  reauthentication-flow: done
  test-coverage:
    status: done
    comment: Coverage is enforced at >=95% in CI.

  # Gold
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Cloud polling integration; no network discovery.
  discovery:
    status: exempt
    comment: Cloud polling integration; no network discovery.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: todo
    comment: Inverters/dataloggers are read at setup; new ones need a reload.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default: done
  entity-translations: done
  exception-translations: done
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No actionable repairs beyond the built-in reauthentication flow.
  stale-devices:
    status: todo
    comment: Removed devices are not pruned automatically yet.

  # Platinum
  async-dependency: done
  inject-websession: done
  strict-typing:
    status: todo

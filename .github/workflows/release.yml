name: "Release"

on:
  release:
    types:
      - "published"

permissions: {}

jobs:
  release:
    name: "Release"
    runs-on: "ubuntu-latest"
    permissions:
      contents: write
    env:
      # softprops/action-gh-release still ships on Node 20; opt into Node 24
      # to clear the runner deprecation warning until the action updates.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: "Checkout the repository"
        uses: "actions/checkout@v6.0.2"

      - name: "ZIP the integration directory"
        shell: "bash"
        run: |
          cd "${{ github.workspace }}/custom_components/solar_plus_intelbras"
          zip solar_plus_intelbras.zip -r ./

      - name: "Upload the ZIP file to the release"
        uses: "softprops/action-gh-release@v2.5.0"
        with:
          files: ${{ github.workspace }}/custom_components/solar_plus_intelbras/solar_plus_intelbras.zip
